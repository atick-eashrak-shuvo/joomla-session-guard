PLG_SYSTEM_SESSIONGUARD="System - Session Guard"
PLG_SYSTEM_SESSIONGUARD_XML_DESCRIPTION="Warns logged-in users before their Joomla session expires and offers optional one-click session renewal. Supports modal, toast, and banner UI styles for both frontend and backend."

; Fieldset
PLG_SYSTEM_SESSIONGUARD_FIELDSET_BASIC="Session Guard Settings"

; Fields
PLG_SYSTEM_SESSIONGUARD_FIELD_ENABLE_FRONTEND_LABEL="Enable on Frontend"
PLG_SYSTEM_SESSIONGUARD_FIELD_ENABLE_FRONTEND_DESC="Show the session warning on the public-facing site."
PLG_SYSTEM_SESSIONGUARD_FIELD_ENABLE_BACKEND_LABEL="Enable on Backend"
PLG_SYSTEM_SESSIONGUARD_FIELD_ENABLE_BACKEND_DESC="Show the session warning in the Joomla administrator panel."
PLG_SYSTEM_SESSIONGUARD_FIELD_WARNING_TIME_LABEL="Warning Time (minutes)"
PLG_SYSTEM_SESSIONGUARD_FIELD_WARNING_TIME_DESC="How many minutes before session expiry to show the warning. Minimum: 1, Maximum: 30."
PLG_SYSTEM_SESSIONGUARD_FIELD_UI_TYPE_LABEL="Warning Style"
PLG_SYSTEM_SESSIONGUARD_FIELD_UI_TYPE_DESC="Choose how the warning is presented to the user."
PLG_SYSTEM_SESSIONGUARD_UI_MODAL="Modal Dialog"
PLG_SYSTEM_SESSIONGUARD_UI_TOAST="Toast Notification"
PLG_SYSTEM_SESSIONGUARD_UI_BANNER="Top Banner"
PLG_SYSTEM_SESSIONGUARD_FIELD_WARNING_MESSAGE_LABEL="Custom Warning Message"
PLG_SYSTEM_SESSIONGUARD_FIELD_WARNING_MESSAGE_DESC="Override the default warning text. Leave blank to use the default message."
PLG_SYSTEM_SESSIONGUARD_FIELD_AUTO_RENEW_LABEL="Enable Auto-Renew"
PLG_SYSTEM_SESSIONGUARD_FIELD_AUTO_RENEW_DESC="Automatically renew the session in the background before it expires (no user action required)."
PLG_SYSTEM_SESSIONGUARD_FIELD_AUTO_RENEW_BEFORE_LABEL="Auto-Renew Threshold (seconds)"
PLG_SYSTEM_SESSIONGUARD_FIELD_AUTO_RENEW_BEFORE_DESC="Trigger the automatic renewal this many seconds before the session expires. Only applies when Auto-Renew is enabled."
PLG_SYSTEM_SESSIONGUARD_FIELD_CROSS_TAB_LABEL="Cross-Tab Sync"
PLG_SYSTEM_SESSIONGUARD_FIELD_CROSS_TAB_DESC="Synchronise the session countdown across multiple open browser tabs so the warning appears only once."
